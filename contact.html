<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SmartHavenCo</title>
    <link rel="stylesheet" href="styles.css"> <!-- Make sure to link your stylesheet -->
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>If you have any questions or inquiries, feel free to contact us using the form below:</p>
            
            <!-- Contact Form -->
            <form action="https://formspree.io/f/yourformid" method="POST">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Thank you for reaching out to SmartHavenCo!</p>
    </footer>
</body>
</html>
